# Server
server.port=${PORT:8080}
spring.application.name=backend

# Database (Neon Postgres via Render env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}

# Mail (disable health check if not configured)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Base URL
app.base-url=http://localhost:8080

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# Commission
app.platform-commission-rate=${PLATFORM_COMMISSION_RATE:0.15}

# Actuator / Health
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=KeVend Backend
info.app.version=0.0.1-SNAPSHOT

# Disable non-critical health checks
management.health.mail.enabled=false
management.health.diskspace.enabled=false

# Retention
app.retention.reservation-months=${RETENTION_RESERVATION_MONTHS:24}
app.retention.notification-months=${RETENTION_NOTIFICATION_MONTHS:6}

# Twilio
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# Stripe
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# PayBY / POK
payby.merchant-id=${PAYBY_MERCHANT_ID:}
payby.api-key=${PAYBY_API_KEY:}
pok.merchant-id=${POK_MERCHANT_ID:}
pok.api-key=${POK_API_KEY:}

# Subscription
app.subscription.driver-premium-monthly-eur=${DRIVER_PREMIUM_MONTHLY_EUR:4.99}
app.subscription.owner-monthly-eur=${OWNER_MONTHLY_EUR:29.99}
app.subscription.enforce-owner-listing-gate=${ENFORCE_OWNER_LISTING_GATE:false}

# Promo
app.promo.welcome.first-n=${WELCOME_FIRST_N:5}
app.promo.welcome.percent-off=${WELCOME_PERCENT_OFF:50}

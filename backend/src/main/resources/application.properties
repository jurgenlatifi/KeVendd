server.port=${PORT:8080}
spring.application.name=backend

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.hbm2ddl.create_namespaces=true

jwt.secret=${JWT_SECRET}

spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.base-url=http://localhost:8080

# CORS — moved to per-environment files for flexibility
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}

# Commission share retained by the platform on each reservation (0.15 = 15%)
app.platform-commission-rate=${PLATFORM_COMMISSION_RATE:0.15}

# Actuator (NFR-07/08 — uptime & restart visibility)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
management.info.env.enabled=true
info.app.name=KeVend Backend
info.app.version=0.0.1-SNAPSHOT

# Retention horizons (NFR-21 driver history >=24mo, NFR-22 owner data >=12mo)
app.retention.reservation-months=${RETENTION_RESERVATION_MONTHS:24}
app.retention.notification-months=${RETENTION_NOTIFICATION_MONTHS:6}

# Twilio SMS gateway (NFR-04, NFR-05, NFR-09). When unset the LoggingSmsGateway is used.
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}

# Stripe (FR-05 card)
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# PayBY / POK wallets (FR-18). Adapters activate once merchant-id is set.
payby.merchant-id=${PAYBY_MERCHANT_ID:}
payby.api-key=${PAYBY_API_KEY:}
pok.merchant-id=${POK_MERCHANT_ID:}
pok.api-key=${POK_API_KEY:}

# Subscription pricing (driver premium / owner monthly)
app.subscription.driver-premium-monthly-eur=${DRIVER_PREMIUM_MONTHLY_EUR:4.99}
app.subscription.owner-monthly-eur=${OWNER_MONTHLY_EUR:29.99}
# When false, lots from owners without an active subscription remain visible (useful in dev)
app.subscription.enforce-owner-listing-gate=${ENFORCE_OWNER_LISTING_GATE:false}

# Welcome promo automatically attached on driver subscribe (FR-10)
app.promo.welcome.first-n=${WELCOME_FIRST_N:5}
app.promo.welcome.percent-off=${WELCOME_PERCENT_OFF:50}